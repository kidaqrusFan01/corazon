{% extends 'base.html' %}
{% load static %}

{% block title %}
Add Product | Corazon
{% endblock %}

{% block content %}
<div class="add-product-wrap">
    <div class="ap-card">
        <h1>Add a product</h1>
        <p class="ap-sub">Fill in the details below to list a new item on Corazon.</p>

        <form method="POST" enctype="multipart/form-data" class="ap-form">
            {% csrf_token %}
            
            <div class="ap-field">
                <label for="id_title">Product title <span>*</span></label>
                <input type="text" id="id_title" name="title" placeholder="e.g. Wireless Bluetooth Headphones" required>
            </div>

            <div class="ap-field">
                <label for="id_category">Category <span>*</span></label>
                <select id="id_category" name="category" required>
                    <option value="">-- Select a category --</option>
                    {% for cat in categories %}
                        <option value="{{ cat.id }}">{{ cat.name }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="ap-row">
                <div class="ap-field">
                    <label for="id_price">Price (₦) <span>*</span></label>
                    <input type="number" id="id_price" name="price" placeholder="0.00" step="0.01" min="0" required>
                </div>
                <div class="ap-field">
                    <label for="id_stock">Stock quantity <span>*</span></label>
                    <input type="number" id="id_stock" name="stock" placeholder="0" min="0" required>
                </div>
            </div>

            <div class="ap-field">
                <label for="id_description">Description <span>*</span></label>
                <textarea id="id_description" name="description" rows="5" placeholder="Describe your product, features, specs..." required></textarea>
            </div>

            <div class="ap-field">
                <label for="id_image">Product image</label>
                <input type="file" id="id_image" name="image" accept="image/*">
                <p class="ap-help">JPG, PNG. 1 image max. 5MB or less.</p>
            </div>

            <div class="ap-actions">
                <button type="submit" class="ap-save-btn">Save and continue</button>
                <a href="{% url 'dashboard' %}" class="ap-cancel-btn">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}

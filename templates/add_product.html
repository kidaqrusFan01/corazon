{% extends 'base.html' %}
{% load static %}

{% block title %}
Add Product
{% endblock %}

{% block content %}

<h1>Add Product</h1>

<form method="POST" enctype="multipart/form-data">

    {% csrf_token %}

    <input
        type="text"
        name="title"
        placeholder="Product Title"
        required
    >

    <textarea
        name="description"
        placeholder="Description"
        required
    ></textarea>

    <input
        type="number"
        name="price"
        placeholder="Price"
        required
    >

    <input
        type="number"
        name="stock"
        placeholder="Stock"
        required
    >

    <input
        type="file"
        name="image"
    >

    <button type="submit">
        Save Product
    </button>

</form>

{% endblock %}

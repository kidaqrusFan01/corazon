{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Corazon Marketplace{% endblock %}</title>

    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>

<header class="amazon-header">

    <!-- Top Navbar -->
    <div class="navbar-top">

        <div class="logo">
            <a href="{% url 'home' %}">
                <span>Corazon</span>
            </a>
        </div>

        <button class="menu-toggle" id="menu-toggle">
            <i class="fas fa-bars"></i>
        </button>

        <form
            class="search-box"
            action="{% url 'search_products' %}"
            method="GET">

            <input
                type="text"
                name="q"
                placeholder="Search Corazon Marketplace">

            <button type="submit">
                <i class="fas fa-search"></i>
            </button>

        </form>

        <div class="nav-actions" id="mobile-menu">

            <a href="#">
                <span>Hello, Sign In</span>
                <strong>Account</strong>
            </a>

            <a href="#">
                <span>Returns</span>
                <strong>& Orders</strong>
            </a>

            <a href="{% url 'dashboard' %}">
                Dashboard
            </a>

            <a href="{% url 'cart' %}" class="cart-link">
                <i class="fas fa-shopping-cart"></i>

                <span id="cart-count">
                    {{ request.session.cart|length|default:"0" }}
                </span>
            </a>

        </div>

    </div>

    <!-- Category Bar -->
    <nav class="category-bar">

        <a href="#">
            <i class="fas fa-bars"></i> All
        </a>

        {% for category in categories %}
            <a href="{% url 'category_products' category.slug %}">
                {{ category.name }}
            </a>
        {% endfor %}

    </nav>

</header>

<main>
    {% block content %}
    {% endblock %}
</main>

<!-- Mobile Bottom Navigation -->

<div class="bottom-nav">

    <a href="{% url 'home' %}">
        <i class="fas fa-home"></i>
        <span>Home</span>
    </a>

    <a href="{% url 'cart' %}">
        <i class="fas fa-shopping-cart"></i>
        <span>Cart</span>
    </a>

    <a href="{% url 'dashboard' %}">
        <i class="fas fa-user"></i>
        <span>Dashboard</span>
    </a>

</div>

<script src="{% static 'js/app.js' %}"></script>

</body>
</html>

{% extends 'base.html' %}
{% block title %}Password Reset - Corazon{% endblock %}
{% block content %}
<div style="max-width:400px;margin:80px auto;text-align:center;padding:40px;background:white;border:1px solid #ddd;border-radius:4px;">
    <h1>Password changed</h1>
    <p style="margin-top:15px;">Your password has been set. You can sign in now.</p>
    <a href="{% url 'login' %}" style="display:inline-block;background:#febd69;padding:10px 25px;border-radius:3px;text-decoration:none;color:#111;margin-top:20px;">Sign In</a>
</div>
{% endblock %}

{% extends 'base.html' %}
{% block title %}Reset Password - Corazon{% endblock %}
{% block content %}
<style>
.login-container{max-width:350px;margin:60px auto;padding:30px;background:white;border:1px solid #ddd;border-radius:4px;}
.login-container h1{font-size:24px;margin-bottom:15px;}
.login-container input{width:100%;padding:8px;border:1px solid #a6a6a6;border-radius:3px;margin-top:10px;}
.login-btn{width:100%;background:#febd69;border:1px solid #a88734;border-radius:3px;padding:8px;margin-top:20px;cursor:pointer;}
</style>

<div class="login-container">
    <h1>Password assistance</h1>
    <p style="font-size:13px;color:#555;">Enter your email address and we'll send you a link to reset your password.</p>
    <form method="post">
        {% csrf_token %}
        <label>Email</label>{{ form.email }}
        <button type="submit" class="login-btn">Continue</button>
    </form>
</div>
{% endblock %}
